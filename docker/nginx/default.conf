server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  location = / {
    return 302 /backend/login;
  }

  location ^~ /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://sales-agent-api:8000/;
  }

  location ^~ /backend/ {
    rewrite ^/backend(/.*)$ $1 break;

    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
    fastcgi_param DOCUMENT_ROOT /var/www/html/backend/public;
    fastcgi_param REQUEST_URI $uri$is_args$args;
    fastcgi_pass sales-agent-backend:9000;
  }

  location ~ /\.(?!well-known).* {
    deny all;
  }
}
