services:
  sales-agent-backend:
    volumes:
      - ./backend:/var/www/html/backend
      - sales_agent_backend_vendor:/var/www/html/backend/vendor
      - sales_agent_backend_var:/var/www/html/backend/var

  sales-agent-api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_HOST_PORT:-8000}:8000"

  sales-agent-nginx:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:80"

  sales-agent-db:
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

volumes:
  sales_agent_backend_vendor:
  sales_agent_backend_var:
