when@dev:
  monolog:
    handlers:
      main:
        type: rotating_file
        path: '%kernel.logs_dir%/%kernel.environment%.log'
        level: debug
        max_files: 5

when@prod:
  monolog:
    handlers:
      main:
        type: rotating_file
        path: '%kernel.logs_dir%/%kernel.environment%.log'
        level: warning
        max_files: 10
