monolog:
  channels:
    - deprecation

when@dev:
  monolog:
    handlers:
      main:
        type: rotating_file
        path: '%kernel.logs_dir%/%kernel.environment%.log'
        level: debug
        max_files: 5
        channels: ['!event']
      console:
        type: console
        process_psr_3_messages: false
        channels: ['!event', '!doctrine', '!console']

when@test:
  monolog:
    handlers:
      main:
        type: rotating_file
        path: '%kernel.logs_dir%/%kernel.environment%.log'
        level: debug
        max_files: 3
        channels: ['!event']

when@prod:
  monolog:
    handlers:
      main:
        type: fingers_crossed
        action_level: warning
        handler: nested
        excluded_http_codes: [404, 405]
        channels: ['!deprecation']
        buffer_size: 50
      nested:
        type: rotating_file
        path: '%kernel.logs_dir%/prod.log'
        level: warning
        max_files: 14
        formatter: monolog.formatter.json
      console:
        type: console
        process_psr_3_messages: false
        channels: ['!event', '!doctrine']
      deprecation:
        type: rotating_file
        channels: [deprecation]
        path: '%kernel.logs_dir%/deprecations.log'
        level: info
        max_files: 7
        formatter: monolog.formatter.json
