security:
  role_hierarchy:
    ROLE_MANAGER: [ROLE_AGENT]
    ROLE_ADMIN: [ROLE_MANAGER, ROLE_AGENT]

  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    public_routing:
      pattern: ^/api/r/wa
      security: false

    api_login:
      pattern: ^/api/login
      stateless: true
      provider: app_user_provider
      json_login:
        check_path: /api/login
        username_path: email
        password_path: password
        success_handler: App\Security\ApiLoginSuccessHandler
        failure_handler: lexik_jwt_authentication.handler.authentication_failure

    api:
      pattern: ^/api
      stateless: true
      provider: app_user_provider
      jwt: ~

    backend:
      pattern: ^/
      stateless: false
      provider: app_user_provider
      form_login:
        login_path: /login
        check_path: /login-check
        username_parameter: email
        password_parameter: password
        default_target_path: /backend/dashboard
        always_use_default_target_path: true
      logout:
        path: /logout
        target: /backend/login

  access_control:
    - { path: ^/$, roles: PUBLIC_ACCESS }
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/(backend/)?logout$, roles: PUBLIC_ACCESS }
    - { path: ^/(dashboard|profile), roles: [ROLE_AGENT, ROLE_MANAGER, ROLE_ADMIN] }
    - { path: ^/(playbooks|tenants|products|api-health|channels|entry-points|tracking), roles: [ROLE_MANAGER, ROLE_ADMIN] }
    - { path: ^/users, roles: ROLE_ADMIN }
    - { path: ^/api/health, roles: PUBLIC_ACCESS }
    - { path: ^/api/login, roles: PUBLIC_ACCESS }
    - { path: ^/api/r/wa, roles: PUBLIC_ACCESS }
    - { path: ^/api, roles: [ROLE_AGENT, ROLE_MANAGER, ROLE_ADMIN] }
