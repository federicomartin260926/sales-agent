services:
  sales-agent-db:
    restart: unless-stopped
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sales_agent}
      POSTGRES_USER: ${POSTGRES_USER:-sales_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - sales_agent_db_data:/var/lib/postgresql/data
    networks:
      - sales-agent-net

  sales-agent-backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-change-me-in-prod}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sales_agent:secret@sales-agent-db:5432/sales_agent?serverVersion=15&charset=utf8}
      SALES_AGENT_BEARER_TOKEN: ${SALES_AGENT_BEARER_TOKEN:-sales-agent-bearer-token}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-/var/www/html/backend/var/jwt/private.pem}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-/var/www/html/backend/var/jwt/public.pem}
      JWT_TTL: ${JWT_TTL:-3600}
    working_dir: /var/www/html/backend
    depends_on:
      - sales-agent-db
    networks:
      - sales-agent-net

  sales-agent-api:
    restart: unless-stopped
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      PYTHONPATH: /app
      APP_ENV: ${APP_ENV:-dev}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://sales-agent-nginx}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-45}
      OPENAI_RESPONSES_MAX_ATTEMPTS: ${OPENAI_RESPONSES_MAX_ATTEMPTS:-2}
      OPENAI_RESPONSES_RETRY_DELAY_SECONDS: ${OPENAI_RESPONSES_RETRY_DELAY_SECONDS:-0.5}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      SA_DEFAULT_BUSINESS_TIMEZONE: ${SA_DEFAULT_BUSINESS_TIMEZONE:-Europe/Madrid}
      CONTACT_CONTEXT_CACHE_TTL_MINUTES: ${CONTACT_CONTEXT_CACHE_TTL_MINUTES:-360}
      OPENAI_AUDIO_TRANSCRIPTION_COST_PER_MINUTE_EUR: ${OPENAI_AUDIO_TRANSCRIPTION_COST_PER_MINUTE_EUR:-0.02}
      AUDIO_TRANSCRIPTION_PROVIDER: ${AUDIO_TRANSCRIPTION_PROVIDER:-openai}
      AUDIO_TRANSCRIPTION_MODEL: ${AUDIO_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      AUDIO_TRANSCRIPTION_COST_UNIT: ${AUDIO_TRANSCRIPTION_COST_UNIT:-minute}
      AUDIO_TRANSCRIPTION_COST_PER_UNIT_EUR: ${AUDIO_TRANSCRIPTION_COST_PER_UNIT_EUR:-0.02}
      AUDIO_TRANSCRIPTION_ENABLED: ${AUDIO_TRANSCRIPTION_ENABLED:-1}
      AUDIO_TRANSCRIPTION_CURRENCY: ${AUDIO_TRANSCRIPTION_CURRENCY:-EUR}
      AUDIO_TRANSCRIPTION_NOTES: ${AUDIO_TRANSCRIPTION_NOTES:-}
      AUDIO_LLM_FOLLOWUP_RESERVE_COST_EUR: ${AUDIO_LLM_FOLLOWUP_RESERVE_COST_EUR:-0.01}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama-vpn-bridge:11434}
      AUDIO_GATEWAY_BASE_URL: ${AUDIO_GATEWAY_BASE_URL:-}
      AUDIO_GATEWAY_BEARER_TOKEN: ${AUDIO_GATEWAY_BEARER_TOKEN:-}
      AUDIO_TIMEOUT_SECONDS: ${AUDIO_TIMEOUT_SECONDS:-15}
      AUDIO_MAX_BYTES: ${AUDIO_MAX_BYTES:-26214400}
      RAG_API_URL: ${RAG_API_URL:-}
      SALES_AGENT_BEARER_TOKEN: ${SALES_AGENT_BEARER_TOKEN:-sales-agent-bearer-token}
      MCP_TEST_AUTHORIZATION: ${MCP_TEST_AUTHORIZATION:-}
      NEW_LLM_ORCHESTRATION_ENABLED: ${NEW_LLM_ORCHESTRATION_ENABLED:-false}
      NEW_LLM_ORCHESTRATION_CATALOG_EXECUTION_ENABLED: ${NEW_LLM_ORCHESTRATION_CATALOG_EXECUTION_ENABLED:-false}
      NEW_LLM_ORCHESTRATION_APPOINTMENT_AVAILABILITY_ENABLED: ${NEW_LLM_ORCHESTRATION_APPOINTMENT_AVAILABILITY_ENABLED:-false}
      NEW_LLM_ORCHESTRATION_SLOT_SELECTION_ENABLED: ${NEW_LLM_ORCHESTRATION_SLOT_SELECTION_ENABLED:-false}
      SA_DEBUG_LLM_PROMPT: ${SA_DEBUG_LLM_PROMPT:-0}
      API_PORT: ${API_PORT:-8000}
    working_dir: /app
    depends_on:
      - sales-agent-backend
    networks:
      - sales-agent-net

  sales-agent-nginx:
    restart: unless-stopped
    image: nginx:1.27-alpine
    depends_on:
      - sales-agent-backend
      - sales-agent-api
    networks:
      - sales-agent-net

volumes:
  sales_agent_db_data:

networks:
  sales-agent-net:
