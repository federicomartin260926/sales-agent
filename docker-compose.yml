services:
  sales-agent-db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sales_agent}
      POSTGRES_USER: ${POSTGRES_USER:-sales_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - sales_agent_db_data:/var/lib/postgresql/data
    networks:
      - sales-agent-net

  sales-agent-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-change-me-in-prod}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sales_agent:secret@sales-agent-db:5432/sales_agent?serverVersion=15&charset=utf8}
      SALES_AGENT_BEARER_TOKEN: ${SALES_AGENT_BEARER_TOKEN:-change-me-sales-agent-bearer-token}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-/var/www/html/backend/var/jwt/private.pem}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-/var/www/html/backend/var/jwt/public.pem}
      JWT_TTL: ${JWT_TTL:-3600}
    working_dir: /var/www/html/backend
    depends_on:
      - sales-agent-db
    networks:
      - sales-agent-net

  sales-agent-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      PYTHONPATH: /app
      APP_ENV: ${APP_ENV:-dev}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://sales-agent-nginx/backend}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama-vpn-bridge:11434}
      CRM_BASE_URL: ${CRM_BASE_URL:-}
      RAG_API_URL: ${RAG_API_URL:-}
      SALES_AGENT_BEARER_TOKEN: ${SALES_AGENT_BEARER_TOKEN:-change-me-sales-agent-bearer-token}
      API_PORT: ${API_PORT:-8000}
    working_dir: /app
    depends_on:
      - sales-agent-backend
    networks:
      - sales-agent-net

  sales-agent-nginx:
    image: nginx:1.27-alpine
    depends_on:
      - sales-agent-backend
      - sales-agent-api
    networks:
      - sales-agent-net

volumes:
  sales_agent_db_data:

networks:
  sales-agent-net:
